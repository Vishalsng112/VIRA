kernel:
  name: VIRA
  checkpoint_dir: ./data/checkpoints
  logs_dir: ./data/logs
  plugins_dir: ./vira/plugins
  modules_dir: ./vira/modules/core
  sensors_dir: ./vira/sensors


auth:
  secret_key: "change-this-to-a-random-secret-key-in-production"   # <-- generate a random string
  session_cookie_name: "vira_session"
  session_max_age: 86400  # 24 hours
  database_url: "sqlite:///data/vira.db"

event_bus:
  max_queue_size: 10000

scheduler:
  tick_interval: 1.0

security:
  default_permissions:
    - "event.publish.*"
    - "context.read"
    - "context.write"
    - "memory.store.*"
    - "memory.get.*"
    - "llm.call.*"

metrics:
  enabled: true
  retention_minutes: 60

sensors:
  - name: system_sensor
    enabled: true
    interval: 1.0

  - name: hardware_sensor
    enabled: true
    interval: 10.0

